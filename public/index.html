<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>NGOConnect AI</title>
<meta name="description" content="Empowering NGOs with AI — manage volunteers, events, and impact.">
<meta name="theme-color" content="#0e0a18">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NGOConnect">
<meta name="format-detection" content="telephone=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#08070c;
    --bg-1:#0e0a18;
    --surface:rgba(255,255,255,0.045);
    --surface-2:rgba(255,255,255,0.07);
    --surface-border:rgba(255,255,255,0.09);
    --field-bg:#151220;
    --text-0:#f5f4f8;
    --text-1:#a7a3b8;
    --text-2:#726e85;
    --purple:#8b7bf7;
    --indigo:#5b4fe0;
    --grad:linear-gradient(135deg,#9b8bf9 0%,#5b4fe0 100%);
    --green:#34d399;
    --blue:#60a5fa;
    --orange:#fb923c;
    --pink:#f472b6;
    --danger:#f87171;
    --radius-lg:24px;
    --radius-md:18px;
    --radius-sm:12px;
    --shadow-glow:0 8px 30px rgba(91,79,224,0.35);
  }
  /* Light mode — same layout, swapped palette. Toggled via data-theme on <html>. */
  [data-theme="light"]{
    --bg-0:#f4f3fb;
    --bg-1:#ffffff;
    --surface:rgba(20,16,40,0.035);
    --surface-2:rgba(20,16,40,0.055);
    --surface-border:rgba(20,16,40,0.09);
    --field-bg:#f0eef8;
    --text-0:#18162a;
    --text-1:#615d78;
    --text-2:#8b87a0;
    --shadow-glow:0 8px 24px rgba(91,79,224,0.22);
  }
  [data-theme="light"] body{
    background:
      radial-gradient(ellipse 900px 500px at 20% -10%, rgba(139,123,247,0.14), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 0%, rgba(139,123,247,0.08), transparent 55%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 45%);
  }
  [data-theme="light"] .nav-pillbar{ background:rgba(255,255,255,0.65); border-color:rgba(20,16,40,0.1); }
  [data-theme="light"] .toast{ background:#221f36; color:#fff; }
  [data-theme="light"] .modal-sheet{ background:#fbfaff; }
  [data-theme="light"] .field-bg, [data-theme="light"] .modal-field, [data-theme="light"] select.plain-select{ background:#f0eef8; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%; overscroll-behavior:none;}
  html{-webkit-text-size-adjust:100%; text-size-adjust:100%; height:100%; height:100dvh;}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:
      radial-gradient(ellipse 900px 500px at 20% -10%, rgba(107,79,224,0.28), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 0%, rgba(139,123,247,0.14), transparent 55%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 45%);
    color:var(--text-0);
    height:100vh;
    height:100dvh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    overscroll-behavior:none;
    touch-action:manipulation;
    overflow:hidden; /* the page itself never scrolls — only designated inner regions do (see .scroll, .chat-log, modals) */
  }
  button, .clickable, [onclick]{-webkit-user-select:none; user-select:none; touch-action:manipulation;}
  /* iOS Safari auto-zooms any input/select/textarea with font-size below 16px on focus — keep all form fields at 16px */
  input, select, textarea{font-size:16px !important;}
  h1,h2,h3,.font-display{font-family:'Manrope',sans-serif;}
  /* Belt-and-suspenders: long unbroken strings (emails, org names, invite codes) can never force horizontal overflow. */
  * { overflow-wrap:break-word; }
  #shell{
    width:100%;
    max-width:440px;
    height:100vh;
    height:100dvh;
    background:transparent;
    position:relative;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    padding-top:env(safe-area-inset-top);
    padding-bottom:env(safe-area-inset-bottom);
  }
  @media (min-width:441px){
    body{padding:28px 0;}
    #shell{
      height:calc(100vh - 56px);
      height:calc(100dvh - 56px);
      border-radius:38px;
      box-shadow:0 40px 90px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06);
      overflow:hidden;
      background:linear-gradient(180deg, var(--bg-1) 0%, var(--bg-0) 45%);
      padding-top:0;
      padding-bottom:0;
    }
  }
  /* min-height:0 below is the fix for the classic flexbox bug where a flex child with
     overflow content grows to fit instead of shrinking + scrolling internally — without it,
     the WHOLE PAGE ends up scrolling (and the "fixed" nav bar drifts away with it). */
  #app{flex:1; min-height:0; display:flex; flex-direction:column; position:relative; overflow:hidden;}
  .screen{display:flex; flex-direction:column; flex:1; min-height:0; overflow:hidden; animation:fadeIn .28s ease;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}
  .scroll{flex:1; min-height:0; overflow-y:auto; overflow-x:hidden; padding:20px 20px 100px 20px; overscroll-behavior:contain; -webkit-overflow-scrolling:touch;}
  .scroll::-webkit-scrollbar{width:0;}

  /* ---------- generic components ---------- */
  .icon-badge{
    width:44px;height:44px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .field{
    display:flex; align-items:center; gap:12px;
    background:var(--field-bg);
    border:1px solid var(--surface-border);
    border-radius:999px;
    padding:15px 20px;
    margin-bottom:14px;
  }
  .field svg{flex-shrink:0; color:var(--text-2);}
  .field input{
    background:transparent; border:none; outline:none;
    color:var(--text-0); font-size:15px; width:100%;
    font-family:'Inter',sans-serif;
  }
  .field input::placeholder{color:var(--text-2);}
  .btn-primary{
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; padding:16px; border:none; border-radius:999px;
    background:var(--grad); color:#fff; font-weight:700; font-size:16px;
    cursor:pointer; box-shadow:var(--shadow-glow);
    font-family:'Manrope',sans-serif;
    transition:transform .15s ease, opacity .15s ease;
  }
  .btn-primary:active{transform:scale(0.97);}
  .btn-ghost{
    background:var(--surface-2); color:var(--text-0); border:1px solid var(--surface-border);
    border-radius:999px; padding:10px 18px; font-weight:600; font-size:13px; cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .link-purple{color:var(--purple); font-weight:600; cursor:pointer;}
  .card{
    background:var(--surface);
    border:1px solid var(--surface-border);
    border-radius:var(--radius-lg);
    padding:18px;
  }
  .pill{
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 14px; border-radius:999px; font-size:12px; font-weight:600;
  }
  .section-title{
    display:flex; align-items:baseline; justify-content:space-between;
    margin:26px 0 14px 0;
  }
  .section-title h3{margin:0; font-size:18px; font-weight:800;}
  .section-title span{font-size:12px; color:var(--text-1); font-weight:600;}
  .avatar{
    border-radius:999px; display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:700; font-family:'Manrope',sans-serif; flex-shrink:0;
    background:var(--grad);
  }
  .row{display:flex; align-items:center;}
  .between{justify-content:space-between;}
  .gap8{gap:8px;} .gap10{gap:10px;} .gap12{gap:12px;} .gap14{gap:14px;}
  .muted{color:var(--text-1);}
  .faint{color:var(--text-2);}
  .bold{font-weight:700;}
  .clickable{cursor:pointer;}
  .hscroll{display:flex; gap:14px; overflow-x:auto; padding-bottom:4px; margin:0 -20px; padding-left:20px; padding-right:20px;}
  .hscroll::-webkit-scrollbar{height:0;}
  .toast{
    position:absolute; left:50%; bottom:96px; transform:translateX(-50%);
    background:#1c1830; border:1px solid var(--surface-border);
    color:var(--text-0); padding:12px 20px; border-radius:999px;
    font-size:13px; font-weight:600; box-shadow:0 10px 30px rgba(0,0,0,0.5);
    opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease;
    z-index:80; white-space:nowrap;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-6px);}

  /* ---------- install banner ---------- */
  .install-banner{
    margin:16px 0 0 0; display:flex; align-items:center; gap:12px;
    background:linear-gradient(135deg, rgba(139,123,247,0.16), rgba(91,79,224,0.1));
    border:1px solid rgba(139,123,247,0.35); border-radius:18px; padding:13px 14px;
  }
  .install-banner .txt{flex:1;}
  .install-banner .txt .t{font-weight:700; font-size:13.5px;}
  .install-banner .txt .s{font-size:11.5px; color:var(--text-1); margin-top:1px;}
  .install-banner button{
    background:var(--grad); border:none; color:#fff; font-weight:700; font-size:12.5px;
    padding:9px 14px; border-radius:999px; cursor:pointer; flex-shrink:0; font-family:'Manrope',sans-serif;
  }
  .install-banner .dismiss{background:transparent; color:var(--text-2); padding:9px 6px; box-shadow:none;}
  .banner-row{
    margin:16px 0 0 0; display:flex; align-items:center; gap:12px;
    border-radius:18px; padding:13px 14px;
  }
  .banner-row.birthday{ background:linear-gradient(135deg, rgba(244,114,182,0.16), rgba(139,123,247,0.1)); border:1px solid rgba(244,114,182,0.3); }
  .banner-row.announce{ background:linear-gradient(135deg, rgba(96,165,250,0.14), rgba(139,123,247,0.08)); border:1px solid rgba(96,165,250,0.3); }
  .banner-row .txt{flex:1; min-width:0;}
  .banner-row .txt .t{font-weight:700; font-size:13.5px;}
  .banner-row .txt .s{font-size:11.5px; color:var(--text-1); margin-top:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

  /* ---------- bottom nav ---------- */
  #bottomnav{
    position:absolute; left:0; right:0; bottom:0;
    display:flex; justify-content:center; padding:14px 14px 20px 14px;
    pointer-events:none;
  }
  .nav-pillbar{
    pointer-events:auto;
    display:flex; align-items:center; gap:2px;
    background:rgba(24,20,38,0.55);
    backdrop-filter:blur(22px) saturate(180%);
    -webkit-backdrop-filter:blur(22px) saturate(180%);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:999px; padding:7px;
    box-shadow:0 16px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
    max-width:100%;
  }
  .nav-item{
    display:flex; align-items:center; gap:6px;
    padding:11px 13px; border-radius:999px; cursor:pointer;
    color:var(--text-1); transition:all .2s ease; flex-shrink:0;
  }
  .nav-item.active{
    background:var(--grad); color:#fff;
  }
  .nav-item span{font-size:12.5px; font-weight:700; font-family:'Manrope',sans-serif; white-space:nowrap;}

  /* ---------- auth ---------- */
  .auth-wrap{flex:1; display:flex; flex-direction:column; justify-content:center; padding:36px 28px;}
  .auth-logo{
    width:84px;height:84px;border-radius:24px;background:var(--grad);
    display:flex;align-items:center;justify-content:center;margin:0 auto 26px auto;
    box-shadow:0 0 50px rgba(139,123,247,0.55);
  }
  .auth-title{text-align:center; font-size:27px; font-weight:800; margin:0 0 6px 0;}
  .auth-sub{text-align:center; color:var(--text-1); margin:0 0 34px 0; font-size:14.5px;}
  .auth-heading-left{font-size:27px; font-weight:800; margin:0 0 6px 0;}
  .auth-sub-left{color:var(--text-1); margin:0 0 30px 0; font-size:14.5px; line-height:1.4;}
  .auth-footer{text-align:center; margin-top:18px; color:var(--text-1); font-size:14px;}
  .choice-card{
    display:flex; align-items:center; gap:14px; text-align:left; width:100%;
    background:var(--surface); border:1px solid var(--surface-border); border-radius:20px;
    padding:18px; margin-bottom:14px; cursor:pointer; transition:transform .15s ease, border-color .15s ease;
  }
  .choice-card:active{transform:scale(0.97);}
  .choice-card:hover{border-color:rgba(139,123,247,0.4);}
  .choice-card .icon-badge{width:48px; height:48px; border-radius:14px; background:var(--grad); flex-shrink:0;}
  .choice-card .txt{flex:1; min-width:0;}
  .choice-card .txt .t{font-weight:800; font-size:16px; font-family:'Manrope',sans-serif;}
  .choice-card .txt .s{font-size:12.5px; color:var(--text-1); margin-top:2px; line-height:1.4;}

  /* ---------- top greeting ---------- */
  .greet-name{font-size:26px; font-weight:800; display:flex; align-items:center; gap:8px;}

  /* ---------- live impact card ---------- */
  .impact-hero{
    position:relative; border-radius:var(--radius-lg); overflow:hidden;
    padding:20px; min-height:170px; display:flex; flex-direction:column; justify-content:flex-end;
    background:
      linear-gradient(180deg, rgba(10,8,16,0.15) 0%, rgba(8,6,14,0.85) 100%),
      radial-gradient(circle at 30% 20%, rgba(251,191,110,0.35), transparent 45%),
      linear-gradient(135deg, #3a2a52 0%, #201830 60%, #100c1c 100%);
    margin-top:18px;
  }
  .impact-hero::before{
    content:"";
    position:absolute; inset:0;
    background-image:
      radial-gradient(2px 2px at 20% 30%, rgba(255,220,150,0.9), transparent),
      radial-gradient(2px 2px at 60% 15%, rgba(255,220,150,0.7), transparent),
      radial-gradient(2px 2px at 80% 40%, rgba(255,220,150,0.8), transparent),
      radial-gradient(2px 2px at 40% 55%, rgba(255,220,150,0.6), transparent),
      radial-gradient(2px 2px at 90% 20%, rgba(255,220,150,0.7), transparent);
    opacity:0.8;
  }
  .live-badge{
    align-self:flex-start;
    background:rgba(10,10,14,0.55); border:1px solid rgba(255,255,255,0.12);
    backdrop-filter:blur(6px);
    display:flex; align-items:center; gap:6px;
    padding:6px 12px; border-radius:999px; font-size:11.5px; font-weight:700;
    margin-bottom:auto; position:relative; z-index:1;
  }
  .dot{width:7px;height:7px;border-radius:999px; background:var(--green); box-shadow:0 0 8px var(--green);}
  .impact-title{font-size:21px; font-weight:800; line-height:1.25; margin:14px 0 16px 0; position:relative; z-index:1;}
  .impact-stats{display:flex; gap:10px; position:relative; z-index:1;}
  .impact-stat{
    flex:1; min-width:0; background:rgba(10,8,16,0.55); border:1px solid rgba(255,255,255,0.09);
    backdrop-filter:blur(6px);
    border-radius:14px; padding:10px 8px; text-align:center;
  }
  .impact-stat svg{margin-bottom:4px;}
  .impact-stat .val{font-size:16px; font-weight:800; display:block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .impact-stat .lab{font-size:9.5px; color:var(--text-1); letter-spacing:0.05em; font-weight:700;}

  /* ---------- quick actions ---------- */
  .qa-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px;}
  .qa-card{
    background:var(--surface); border:1px solid var(--surface-border); border-radius:18px;
    padding:16px 10px; display:flex; flex-direction:column; align-items:flex-start; gap:20px;
    cursor:pointer; transition:transform .15s ease; min-width:0;
  }
  .qa-card:active{transform:scale(0.96);}
  .qa-card span{font-size:12.5px; font-weight:700; font-family:'Manrope',sans-serif; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:100%; display:block;}

  /* ---------- activity ---------- */
  .activity-item{
    display:flex; align-items:center; gap:12px; padding:12px 0;
    border-bottom:1px solid rgba(255,255,255,0.055);
  }
  .activity-item:last-child{border-bottom:none;}
  .activity-text{flex:1; min-width:0;}
  .activity-text .t{font-size:14px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .activity-text .s{font-size:12px; color:var(--text-1); margin-top:1px;}
  .activity-time{font-size:11.5px; color:var(--text-2); flex-shrink:0; font-weight:600;}

  /* ---------- events horizontal cards ---------- */
  .event-card-sm{
    position:relative; min-width:250px; border-radius:20px; overflow:hidden;
    height:190px; display:flex; flex-direction:column; justify-content:flex-end; padding:16px;
    cursor:pointer;
  }
  .event-card-sm .bg{position:absolute; inset:0; z-index:0;}
  .event-card-sm .shade{position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,0.05) 30%, rgba(0,0,0,0.88) 100%); z-index:1;}
  .event-card-sm > *:not(.bg):not(.shade){position:relative; z-index:2;}
  .event-badge{
    align-self:flex-start; background:rgba(10,10,14,0.6); border:1px solid rgba(255,255,255,0.15);
    padding:5px 11px; border-radius:999px; font-size:11px; font-weight:700; display:flex; align-items:center; gap:6px;
    margin-bottom:auto;
  }
  .event-loc{display:flex; align-items:center; gap:5px; font-size:11.5px; color:#d8d5e6; margin-bottom:4px;}
  .event-title-sm{font-size:16.5px; font-weight:800; margin-bottom:3px;}
  .event-date-sm{font-size:12px; color:#c9c6d8;}

  /* ---------- nova suggestions ---------- */
  .sugg-card{
    display:flex; align-items:flex-start; gap:14px;
    background:var(--surface); border:1px solid var(--surface-border); border-radius:18px;
    padding:15px; margin-bottom:12px; cursor:pointer; transition:transform .15s ease;
  }
  .sugg-card:active{transform:scale(0.98);}
  .sugg-text{flex:1; min-width:0;}
  .sugg-text .t{font-weight:700; font-size:14.5px; margin-bottom:2px;}
  .sugg-text .s{font-size:12.5px; color:var(--text-1);}

  /* ---------- monthly impact list ---------- */
  .impact-row{display:flex; align-items:center; justify-content:space-between; padding:11px 0;}
  .impact-row .left{display:flex; align-items:center; gap:10px; color:var(--text-1); font-size:14px; font-weight:600;}
  .impact-row .dotc{width:9px; height:9px; border-radius:999px;}
  .impact-row .val{font-weight:800; font-size:15px;}

  /* ---------- header bars ---------- */
  .page-header{padding:22px 20px 4px 20px;}
  .page-header h1{font-size:26px; font-weight:800; margin:0;}
  .page-header .sub{color:var(--text-1); font-size:13.5px; margin-top:3px;}
  .header-row{display:flex; align-items:flex-start; justify-content:space-between;}
  .fab{
    width:46px; height:46px; border-radius:999px; background:var(--grad);
    display:flex; align-items:center; justify-content:center; color:#fff; cursor:pointer;
    box-shadow:var(--shadow-glow); border:none; flex-shrink:0;
  }

  /* ---------- filter pills ---------- */
  .filters{display:flex; gap:8px; overflow-x:auto; padding:16px 0 4px 0; margin-bottom:6px;}
  .filters::-webkit-scrollbar{height:0;}
  .filter-pill{
    padding:9px 16px; border-radius:999px; font-size:13px; font-weight:700; white-space:nowrap; cursor:pointer;
    border:1px solid var(--surface-border); color:var(--text-1); background:transparent; flex-shrink:0;
    transition:background 0.15s ease, color 0.15s ease, transform 0.1s ease, border-color 0.15s ease;
  }
  .filter-pill:active{transform:scale(0.96);}
  .filter-pill.active{background:rgba(139,123,247,0.16); border-color:var(--purple); color:#cdc3ff;}

  /* ---------- volunteer list ---------- */
  .vol-row{
    display:flex; align-items:center; gap:13px; padding:12px; border-radius:18px;
    background:var(--surface); border:1px solid var(--surface-border); margin-bottom:10px; cursor:pointer;
  }
  .vol-row .info{flex:1; min-width:0;}
  .vol-row .name{font-weight:700; font-size:15px;}
  .vol-row .role{font-size:12.5px; color:var(--text-1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .hours-badge{
    display:flex; align-items:center; gap:5px; background:rgba(52,211,153,0.14); color:var(--green);
    padding:6px 11px; border-radius:999px; font-size:12.5px; font-weight:800; flex-shrink:0;
  }

  /* ---------- volunteer detail ---------- */
  .detail-top{display:flex; align-items:center; gap:14px; padding:18px 20px 4px 20px;}
  .back-btn{
    width:38px; height:38px; border-radius:999px; background:var(--surface-2); border:1px solid var(--surface-border);
    display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--text-0); flex-shrink:0;
  }
  .detail-title{font-size:16.5px; font-weight:800; flex:1; text-align:center; margin-right:38px;}
  .detail-avatar-wrap{display:flex; flex-direction:column; align-items:center; padding:14px 20px 6px 20px;}
  .detail-avatar{width:96px; height:96px; font-size:34px; margin-bottom:14px;}
  .detail-name{font-size:22px; font-weight:800;}
  .detail-role{color:var(--text-1); font-size:14px; margin-top:2px;}

    transition:transform 0.16s cubic-bezier(.2,.8,.2,1), box-shadow 0.16s ease, background 0.16s ease, opacity 0.16s ease;

  .bubble.thinking{align-self:flex-start; background:var(--surface); border:1px solid var(--surface-border); color:var(--text-1); font-style:italic;}
  .typing-dots{display:inline-flex; gap:3px; align-items:center;}

  .typing-dots span:nth-child(3){animation-delay:0.3s;}
  @keyframes typingBounce{0%,60%,100%{transform:translateY(0); opacity:0.5;} 30%{transform:translateY(-4px); opacity:1;}}
  .nova-input-bar{
    display:flex; align-items:center; gap:10px; padding:14px 20px 18px 20px;
    margin-bottom:92px; /* clears the floating glass nav bar, which is absolutely positioned on top */
  }
  .nova-input-bar .field{flex:1; margin-bottom:0; padding:14px 20px;}
  .send-btn{
    width:48px; height:48px; border-radius:999px; background:var(--grad); border:none; color:#fff;
    display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; box-shadow:var(--shadow-glow);
  }
  .send-btn:disabled{opacity:0.5; cursor:default;}

  /* ---------- modal ---------- */
  .modal-overlay{
    position:absolute; inset:0; background:rgba(5,4,10,0.72); backdrop-filter:blur(3px);
    display:flex; align-items:flex-end; justify-content:center; z-index:100;
    opacity:0; pointer-events:none; transition:opacity .2s ease;
  }
  .modal-overlay.open{opacity:1; pointer-events:auto;}
  .modal-sheet{
    width:100%; background:#141020; border:1px solid var(--surface-border); border-top-left-radius:28px; border-top-right-radius:28px;
    padding:22px 22px 28px 22px; transform:translateY(20px); transition:transform .25s ease;

  }
  .modal-overlay.open .modal-sheet{transform:translateY(0);}

/* ---- Feature: Activity Timeline ---- */
@keyframes tlIn{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }

.bars-row{ display:flex; align-items:flex-end; gap:8px; height:120px; }
.bars-row .bar-col{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; gap:6px; }
.bars-row .bar{ width:100%; max-width:26px; border-radius:6px 6px 3px 3px; background:linear-gradient(180deg,#8b7bf7,#5b4fe0); transform:scaleY(0); transform-origin:bottom; animation:barGrow 0.7s cubic-bezier(0.22,1,0.36,1) forwards; }
@keyframes barGrow{ to{ transform:scaleY(1); } }
.bars-row .bar-label{ font-size:10px; color:var(--text-2); font-weight:700; }

.growth-badge.down{ background:rgba(248,113,113,0.16); color:#f87171; }

.goal-card{ cursor:pointer; transition:transform 0.15s ease, border-color 0.15s ease; }

.progress-fill{ transition:width 0.7s cubic-bezier(0.22,1,0.36,1); }
.milestone-row{ display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.055); }
.milestone-row:last-child{ border-bottom:none; }
.milestone-dot{ width:26px; height:26px; border-radius:999px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:11px; font-weight:800; }

.goal-tab.active{ background:var(--surface); color:var(--text-1); }

function safeLocalGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function safeLocalSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
function safeLocalRemove(k){ try{ localStorage.removeItem(k); }catch(e){} }

async function apiFetch(path, opts={}){
  const headers = Object.assign({'Content-Type':'application/json'}, opts.headers||{});
  if(AUTH_TOKEN) headers['Authorization'] = 'Bearer '+AUTH_TOKEN;
  const res = await fetch(API_BASE+path, Object.assign({}, opts, {headers}));
  let body = null;
  try{ body = await res.json(); }catch(e){ /* no body */ }
  if(!res.ok){
    const msg = (body && body.error) ? body.error : `Request failed (${res.status})`;
    throw new Error(msg);
  }
  return body;
}

// Mirrors db.js's goalTree(): nests goals by parentId and rolls child progress up into
// the parent, so "Plant 1000 Trees" always reflects July + August + September.
function buildGoalTree(goals){
  const byId = {};
  goals.forEach(g=> byId[g.id] = Object.assign({}, g, {children:[]}) );
  const roots = [];
  goals.forEach(g=>{
    if(g.parentId && byId[g.parentId]) byId[g.parentId].children.push(byId[g.id]);
    else roots.push(byId[g.id]);
  });
  const rollUp = (node)=>{
    node.children.forEach(rollUp);
    if(node.children.length){
      node.current = node.children.reduce((a,c)=>a+c.current,0);
      node.target = node.children.reduce((a,c)=>a+c.target,0) || node.target;
      node.progressPct = node.target>0 ? Math.min(100, Math.round((node.current/node.target)*1000)/10) : 0;
    }
  };
  roots.forEach(rollUp);
  return roots;
}

/* ============================= NAV / RENDER ============================= */
function go(view){
  state.view = view;
  if((view==='volunteers' || view==='volunteerDetail') && (isAdmin() || myRole()==='manager')) loadVolunteersAllQuiet();
  if(view==='timeline') loadTimelineQuiet();
  if(view==='impact') loadImpactQuiet();
  if(view==='workload') loadWorkloadQuiet();
  render();
}
async function loadWorkloadQuiet(){
  if(OFFLINE_MODE) return;
  try{
    const data = await apiFetch('/api/workload', { method:'GET' });
    state.workload = data.workload || [];
    if(state.view==='workload') render();
  }catch(e){ /* keep whatever we had */ }
}
async function loadVolunteersAllQuiet(){
  if(OFFLINE_MODE || !(isAdmin() || myRole()==='manager')) return;
  try{
    const data = await apiFetch('/api/volunteers/all', { method:'GET' });
    state.volunteersAll = data.volunteers || [];
    if(data.onlineUserIds) state.onlineUserIds = data.onlineUserIds;
    if(!isUserBusy() && !document.getElementById('modalRoot')) render();
  }catch(e){ /* keep whatever we had */ }
}
function render(){
  const app = document.getElementById('app');
  let html = '';
  switch(state.view){
    case 'signin': html = viewSignIn(); break;
    case 'forgotPassword': html = viewForgotPassword(); break;
    case 'resetPassword': html = viewResetPassword(); break;
    case 'getstarted': html = viewGetStarted(); break;
    case 'signup': html = viewSignUp(); break;
    case 'join': html = viewJoin(); break;
    case 'apply': html = viewApply(); break;
    case 'pendingApproval': html = viewPendingApproval(); break;
    case 'home': html = wrapWithNav(viewHome(), 'home'); break;
    case 'volunteers': html = wrapWithNav(viewVolunteers(), 'volunteers'); break;
    case 'volunteerDetail': html = viewVolunteerDetail(); break;
    case 'events': html = wrapWithNav(viewEvents(), 'events'); break;
    case 'eventDetail': html = viewEventDetail(); break;
    case 'funds': html = wrapWithNav(viewFunds(), 'funds'); break;
    case 'goalDetail': html = viewGoalDetail(); break;
    case 'workload': html = wrapWithNav(viewWorkload(), 'volunteers'); break;
    case 'timeline': html = viewTimeline(); break;
    case 'impact': html = viewImpact(); break;
    case 'nova': html = viewNova(); break;
    case 'messages': html = viewMessagesList(); break;
    case 'conversation': html = viewConversationThread(); break;
    default: html = viewSignIn();
  }
  // Nothing actually changed on screen — skip the DOM swap entirely so a background
  // refresh from someone else's action never visibly flashes this screen.
  if(app.dataset.lastView === state.view && app.__lastHtml === html){
    updateNavBadges();
    return;
  }
  // Preserve scroll position of any scrollable panes across the swap, so a background
  // refresh doesn't yank the person back to the top of a list they were reading.
  const prevScrolls = Array.from(app.querySelectorAll('.scroll')).map(el=>el.scrollTop);
  app.innerHTML = html;
  app.__lastHtml = html;
  app.dataset.lastView = state.view;
  const newScrolls = app.querySelectorAll('.scroll');
  newScrolls.forEach((el,i)=>{ if(prevScrolls[i]!==undefined) el.scrollTop = prevScrolls[i]; });
  afterRender();
  updateNavBadges();
}
function wrapWithNav(innerHtml, active){
  return `<div class="screen" style="padding-bottom:0;">${innerHtml}${navBar(active)}</div>`;
}
function navBar(active){
  const items = [
    {k:'home', label:'Home', ic:'home'},
    {k:'volunteers', label:'Volunteers', ic:'users'},
    {k:'events', label:'Events', ic:'calendar'},
    {k:'funds', label:'Funds', ic:'heart'},
    {k:'nova', label:'Nova', ic:'zap'},
  ];
  return `<div id="bottomnav"><div class="nav-pillbar">
    ${items.map(it=>`
      <div class="nav-item ${active===it.k?'active':''}" onclick="go('${it.k}')">
        ${icon(it.ic,18)}${active===it.k?`<span>${it.label}</span>`:''}
      </div>`).join('')}
  </div></div>`;
}

// Which on-screen views actually show data affected by each broadcast 'kind'. Used to
// decide whether a background update needs a full re-render (visible to the user) or can
// just refresh the underlying state quietly — this is what stops the whole screen from
// flashing every time *anyone* in the org does *anything*.
const KIND_VIEWS = {
  'volunteer-added': ['home','volunteers','timeline','impact'],
  'volunteer-updated': ['home','volunteers','volunteerDetail'],
  'volunteer-status-changed': ['home','volunteers','volunteerDetail'],
  'hours-logged': ['home','volunteers','volunteerDetail','timeline','impact'],
  'event-added': ['home','events','timeline','impact'],
  'event-updated': ['home','events','eventDetail'],
  'event-comment': ['eventDetail'],
  'donation-added': ['home','funds','timeline','impact'],
  'goal-added': ['home','funds','timeline'],
  'goal-updated': ['home','funds','goalDetail'],
  'goal-reached': ['home','funds','goalDetail','timeline'],
  'goal-comment': ['goalDetail'],
  'impact-updated': ['impact'],
  'announcement-added': ['home','timeline'],
  'task-added': ['home','volunteers','timeline'],
  'task-updated': ['home','volunteers'],
  'task-deleted': ['home','volunteers'],
  'attendance-changed': ['home','volunteers'],
  'approval-requested': ['home'],
  'approval-resolved': ['home','pendingApproval'],
  'role-changed': ['home','volunteers'],
  'colleague-joined': ['home'],
  'presence-changed': ['volunteers','volunteerDetail'],
};
// True while the person is actively typing/selecting somewhere — a background refresh
// should never yank focus or redraw underneath their cursor.
function isUserBusy(){
  const el = document.activeElement;
  if(!el) return false;
  const tag = el.tagName;
  return tag==='INPUT' || tag==='TEXTAREA' || tag==='SELECT' || el.isContentEditable===true;
}
// Patch just the notification/message badge counts in place — no full re-render, so this
// never causes a visible flicker, and it works no matter which screen is on-screen.
function updateNavBadges(){
  document.querySelectorAll('.bell-badge').forEach(el=>{
    el.textContent = state.unreadNotifications>9 ? '9+' : state.unreadNotifications;
    el.style.display = state.unreadNotifications>0 ? 'flex' : 'none';
  });
  document.querySelectorAll('.mail-badge').forEach(el=>{
    el.textContent = state.unreadMessages>9 ? '9+' : state.unreadMessages;
    el.style.display = state.unreadMessages>0 ? 'flex' : 'none';
  });
}
async function handleRealtimeUpdate(kind){
  if(OFFLINE_MODE || !AUTH_TOKEN) return;
  try{
    const data = await apiFetch('/api/bootstrap', { method:'GET' });
    applyBootstrap(data);
  }catch(e){ return; /* transient — try again on the next event */ }
  if((isAdmin() || myRole()==='manager') && ['volunteer-added','volunteer-status-changed','volunteer-updated','presence-changed'].includes(kind)){
    try{ const d = await apiFetch('/api/volunteers/all', { method:'GET' }); state.volunteersAll = d.volunteers || []; if(d.onlineUserIds) state.onlineUserIds = d.onlineUserIds; }catch(e){ /* ignore */ }
  }
  if(state.view==='timeline' && (KIND_VIEWS[kind]||[]).includes('timeline')) loadTimelineQuiet();
  if(state.view==='impact' && (KIND_VIEWS[kind]||[]).includes('impact')) loadImpactQuiet();
  if(state.view==='goalDetail' && state.selectedGoalId && (kind==='goal-updated' || kind==='goal-reached' || kind==='goal-comment')) loadGoalDetailQuiet(state.selectedGoalId);
  updateNavBadges();
  const views = KIND_VIEWS[kind];
  const relevant = !views || views.includes(state.view);
  const modalOpen = !!document.getElementById('modalRoot');
  if(relevant && !isUserBusy() && !modalOpen){
    render();
  }
}
// Real-time updates over SSE. Never let a construction/connection failure crash
// the sign-in flow — some browsers/networks may not support or allow it.
function connectRealtime(){
  try{
    if(OFFLINE_MODE || !AUTH_TOKEN) return;
    if(state.eventSource){ try{ state.eventSource.close(); }catch(e){} }
    if(typeof EventSource === 'undefined') return;
    const es = new EventSource(`${API_BASE}/api/stream?token=${encodeURIComponent(AUTH_TOKEN)}`);
    es.addEventListener('status-change', (e)=>{
      try{
        const payload = JSON.parse(e.data);
        if(payload.status === 'active' && state.user && state.user.status === 'pending'){
          state.user.status = 'active';
          refreshBootstrapQuiet().then(()=> go('home'));
        } else if(payload.status === 'removed'){
          showToast('Your access has been removed.');
          signOut();
        }
      }catch(err){ /* ignore malformed event */ }
    });
    es.addEventListener('notification', ()=>{ refreshNotificationsQuiet(); });
    es.addEventListener('message', (e)=>{
      try{
        const payload = JSON.parse(e.data);
        handleIncomingMessage(payload);
      }catch(err){ /* ignore */ }
    });
    es.addEventListener('typing', (e)=>{
      try{
        const payload = JSON.parse(e.data);
        if(state.view==='conversation' && state.currentConversationId===payload.conversationId){
          showTypingIndicator(payload.name);
        }
      }catch(err){ /* ignore */ }
    });
    es.addEventListener('read-receipt', (e)=>{
      try{
        const payload = JSON.parse(e.data);
        const c = state.conversations.find(x=>x.id===payload.conversationId);
        if(c) c.otherLastReadAt = payload.readAt;
        // Patch tick marks in place if that thread happens to be open — no full re-render.
        if(state.view==='conversation' && state.currentConversationId===payload.conversationId){
          render();
        }
      }catch(err){ /* ignore */ }
    });
    es.addEventListener('update', (e)=>{
      let kind = null;
      try{ kind = JSON.parse(e.data).kind; }catch(err){ /* ignore */ }
      handleRealtimeUpdate(kind);
    });
    es.onerror = ()=>{ /* browser auto-reconnects; nothing to do */ };
    state.eventSource = es;
  }catch(e){ /* real-time is a nice-to-have, never block the app on it */ state.eventSource = null; }
}
async function refreshBootstrapQuiet(){
  if(OFFLINE_MODE || !AUTH_TOKEN) return;
  try{
    const data = await apiFetch('/api/bootstrap', { method:'GET' });
    applyBootstrap(data);
    render();
  }catch(e){ /* ignore transient refresh failures */ }
}
async function refreshNotificationsQuiet(){
  if(OFFLINE_MODE || !AUTH_TOKEN) return;
  try{
    const [n, u] = await Promise.all([
      apiFetch('/api/notifications', { method:'GET' }),
      apiFetch('/api/notifications/unread-count', { method:'GET' }),
    ]);
    state.notifications = n.notifications || [];
    state.unreadNotifications = u.unread || 0;
    // Patch the badge in place instead of a full re-render — keeps the bell accurate
    // everywhere without flashing the screen the person is currently looking at.
    updateNavBadges();
  }catch(e){ /* ignore */ }
}
function handleIncomingMessage(payload){
  const convoId = payload.conversationId;
  const msg = payload.message;
  const existing = state.conversations.find(c => c.id === convoId);
  if(state.view === 'conversation' && state.currentConversationId === convoId){
    if(!state.currentMessages) state.currentMessages = [];
    state.currentMessages.push(msg);
    if(existing) existing.unread = 0;
    clearTimeout(typingHideTimer);
    const ti = document.getElementById('typingIndicator');
    if(ti) ti.style.display = 'none';
    apiFetch(`/api/conversations/${convoId}/messages`, { method:'GET' }).catch(()=>{}); // mark read server-side
    render();
    return;
  }
  if(existing){
    existing.lastMessage = { text: msg.text, senderName: msg.senderName, time:'now', createdAt: msg.createdAt };
    existing.unread = (existing.unread||0) + 1;
  } else {
    // Brand-new conversation we don't know about yet — do a full refresh so it appears.
    refreshConversationsQuiet();
  }
  state.unreadMessages = (state.unreadMessages||0) + 1;
  updateNavBadges();
  if(state.view === 'messages') render();
}
async function refreshConversationsQuiet(){
  if(OFFLINE_MODE || !AUTH_TOKEN) return;
  try{
    const data = await apiFetch('/api/conversations', { method:'GET' });
    state.conversations = data.conversations || [];
    state.unreadMessages = state.conversations.reduce((a,c)=>a+(c.unread||0),0);
    render();
  }catch(e){ /* ignore */ }
}

  if(v.events >= 5) badges.push({icon:'⭐', label:'Event Leader'});
  return badges;
}

function showToastOnBody(msg){
  // used pre-app-shell toast for auth screens
  let t = document.getElementById('toastEl');
  if(!t){
    t = document.createElement('div');
    t.id='toastEl'; t.className='toast'; t.style.bottom='40px';

async function loadTimelineQuiet(){
  if(OFFLINE_MODE){ state.timeline = state.activity.slice(); state.timelineLoaded = true; if(state.view==='timeline') render(); return; }
  try{
    const data = await apiFetch('/api/activity?limit=150', { method:'GET' });
    state.timeline = data.activity || [];
    state.timelineLoaded = true;
    if(state.view==='timeline') render();
  }catch(e){ state.timeline = state.activity.slice(); state.timelineLoaded = true; if(state.view==='timeline') render(); }
}
function groupTimelineByDay(items){
  const todayStr = new Date().toDateString();
  const yestStr = new Date(Date.now()-86400000).toDateString();
  const groups = { Today:[], Yesterday:[], Earlier:[] };
  for(const a of items){
    const d = a.createdAt ? new Date(a.createdAt).toDateString() : todayStr;
    if(d===todayStr) groups.Today.push(a);
    else if(d===yestStr) groups.Yesterday.push(a);
    else groups.Earlier.push(a);
  }
  return groups;
}
function actorAvatarHtml(a){
  if(!a.actorName) return '';
  const initial = a.actorName.charAt(0).toUpperCase();
  const bg = a.actorAvatar ? `background-image:url('${a.actorAvatar}'); background-size:cover; background-position:center;` : 'background:var(--grad);';
  return `<div class="tl-actor-avatar" style="${bg}" title="${escapeAttr(a.actorName)}">${a.actorAvatar?'':initial}</div>`;
}
function viewTimeline(){
  const items = state.timelineLoaded ? state.timeline : state.activity;
  const groups = groupTimelineByDay(items);
  let idx = 0;
  const renderGroup = (label, list) => {
    if(!list.length) return '';
    const rows = list.map(a=>{
      idx++;
      return `
      <div class="tl-item animated" style="animation-delay:${Math.min(idx*35,400)}ms;">
        <div class="icon-badge" style="width:38px;height:38px;border-radius:12px;background:${colorBg(a.color)}; flex-shrink:0;">${icon(a.icon||'bolt2',17,'color:'+colorFg(a.color))}</div>
        <div style="flex:1; min-width:0;">
          <div class="t">${escapeHtml(a.title)}</div>
          ${a.sub?`<div class="s">${escapeHtml(a.sub)}</div>`:''}
        </div>
        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex-shrink:0;">
          ${actorAvatarHtml(a)}
          <div class="activity-time">${a.time}</div>
        </div>
      </div>`;
    }).join('');
    return `<div class="tl-group-label">${label}</div><div class="timeline-wrap">${rows}</div>`;
  };
  return `
  <div class="screen">
    <div class="detail-top">
      <div class="back-btn" onclick="go('home')">${icon('arrowleft',18)}</div>
      <div class="detail-title">Activity Timeline</div>
      <div style="width:38px;"></div>
    </div>
    <div class="scroll" style="padding-top:0;">
      ${items.length ? `${renderGroup('Today', groups.Today)}${renderGroup('Yesterday', groups.Yesterday)}${renderGroup('Earlier', groups.Earlier)}` : `<div class="muted" style="text-align:center; padding:60px 0;">${state.timelineLoaded?'Nothing yet — activity across your NGO will show up here.':'Loading…'}</div>`}
      <div style="height:16px;"></div>

}

function animateCounters(){
  document.querySelectorAll('.count-up').forEach(el=>{
    const to = parseFloat(el.dataset.countTo);
    if(isNaN(to)) return;
    const prefix = el.dataset.prefix || '';
    const suffix = el.dataset.suffix || '';
    const decimals = el.dataset.decimals ? parseInt(el.dataset.decimals,10) : 0;
    const duration = 850;
    const start = performance.now();
    function step(now){
      const p = Math.min(1, (now-start)/duration);
      const eased = 1 - Math.pow(1-p, 3);
      el.textContent = prefix + (to*eased).toLocaleString(undefined,{minimumFractionDigits:decimals, maximumFractionDigits:decimals}) + suffix;
      if(p<1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  });
}
function barChartHtml(title, iconName, series){

    <div class="bars-row">

        <div class="bar-col">
          <div class="bar" style="height:${Math.max(4, Math.round((s.value/max)*100))}%; animation-delay:${i*70}ms;"></div>
          <div class="bar-label">${escapeHtml(s.label)}</div>
        </div>`).join('')}
    </div>
  </div>`;
}

async function submitTaskComment(taskId){
  const input = document.getElementById('task-comment-input');
  const text = input.value.trim();
  if(!text) return;
  if(!OFFLINE_MODE){
    try{
      const data = await apiFetch(`/api/tasks/${taskId}/comments`, { method:'POST', body: JSON.stringify({text}) });
      state.taskComments.push(data.comment);
      renderTaskDetailModal(state.tasks.find(x=>x.id===taskId));
      return;
    }catch(err){ showToast(err.message || 'Could not post comment'); return; }
  }
  state.taskComments.push({id:'tc'+Date.now(), actorName:state.user?.name||'You', text, time:'now'});
  renderTaskDetailModal(state.tasks.find(x=>x.id===taskId));
}
async function uploadTaskAttachment(taskId, inputEl){
  const file = inputEl.files && inputEl.files[0];
  if(!file) return;
  if(file.size > 4_500_000){ showToast('Please choose a file under ~4.5MB'); return; }
  const dataUrl = await new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
  if(!OFFLINE_MODE){
    try{
      const data = await apiFetch('/api/attachments', { method:'POST', body: JSON.stringify({entityType:'task', entityId:taskId, fileName:file.name, fileData:dataUrl, mimeType:file.type}) });
      state.eventAttachments.push(data.attachment);
      renderTaskDetailModal(state.tasks.find(x=>x.id===taskId));
      return;
    }catch(err){ showToast(err.message || 'Could not upload file'); return; }
  }
  state.eventAttachments.push({id:'att'+Date.now(), fileName:file.name, fileData:dataUrl, time:'now'});
  renderTaskDetailModal(state.tasks.find(x=>x.id===taskId));
}
async function deleteTaskUi(taskId){
  if(!OFFLINE_MODE){
    try{ await apiFetch(`/api/tasks/${taskId}`, { method:'DELETE' }); }catch(err){ showToast(err.message||'Could not delete task'); return; }
  }
  state.tasks = state.tasks.filter(t=>t.id!==taskId);
  closeModal(); showToast('Task deleted'); render();
}

function renderTaskVolunteerPicker(){
  const q = taskPickerSearch.toLowerCase();
  const roles = ['All', ...Array.from(new Set(taskPickerVolunteers.map(v=>v.role).filter(Boolean)))];
  const list = taskPickerVolunteers.filter(v=>{
    const hay = [v.name, v.email, v.phone, ...(v.skills||[])].join(' ').toLowerCase();
    const matchesQ = !q || hay.includes(q);
    const matchesStatus = taskPickerStatusFilter==='all' || v.status===taskPickerStatusFilter;
    const matchesRole = taskPickerRoleFilter==='All' || v.role===taskPickerRoleFilter;
    return matchesQ && matchesStatus && matchesRole;
  });
  openModal(`
    <div class="modal-handle"></div>
    <div class="row between" style="align-items:center;">
      <div class="modal-title" style="margin-bottom:0;">Select Volunteer</div>

    </div>
    <div class="filters" style="padding-top:0; flex-wrap:wrap;">
      <div class="filter-pill ${taskPickerStatusFilter==='all'?'active':''}" onclick="setTaskPickerStatus('all')">All</div>

      <div class="filter-pill ${taskPickerStatusFilter==='suspended'?'active':''}" onclick="setTaskPickerStatus('suspended')">Inactive</div>
      ${roles.filter(r=>r!=='All').map(r=>`<div class="filter-pill ${taskPickerRoleFilter===r?'active':''}" onclick="setTaskPickerRole('${escapeAttr(r)}')">${escapeHtml(r)}</div>`).join('')}
    </div>
    <div class="picker-list" style="max-height:44vh;">
      ${taskAssigneeId ? `<div class="picker-row clickable" onclick="selectTaskAssignee('')"><div class="avatar" style="width:36px;height:36px;font-size:13px;background:var(--surface-2);">${icon('x',15)}</div><div><div class="name">Unassign</div><div class="role">Leave this task unassigned</div></div></div>` : ''}
      ${list.length ? list.map(v=>{
        const inactive = v.status !== 'active';
        return `
        <div class="picker-row ${inactive?'':'clickable'} ${v.id===taskAssigneeId?'selected':''}" style="${inactive?'opacity:0.5; cursor:not-allowed;':''}" ${inactive?'':`onclick="selectTaskAssignee('${v.id}')"`}>

          <div style="min-width:0; flex:1;">
            <div class="name">${escapeHtml(v.name)} ${inactive?'<span style="color:var(--danger); font-weight:700; font-size:10.5px;">· INACTIVE</span>':''}</div>

        </div>`;
      }).join('') : `<div class="muted" style="text-align:center; padding:16px 0;">No volunteers match.</div>`}

}

function selectTaskAssignee(id){
  taskAssigneeId = id;
  closeModal();

async function submitNewTask(){
  const title = document.getElementById('task-title').value.trim();
  const assigneeId = taskAssigneeId || '';
  const priority = document.getElementById('task-priority').value;
  const deadline = document.getElementById('task-deadline').value;
  const notes = document.getElementById('task-notes').value.trim();
  const recurrenceEl = document.getElementById('task-recurrence');
  const recurrence = recurrenceEl ? recurrenceEl.value : 'none';
  const dependsOn = taskDepPicker.slice();
  const fileInput = document.getElementById('task-file');
  const file = fileInput.files && fileInput.files[0];
  if(!title){ showToast('Enter a task title'); return; }
  setBtnLoading('task-submit-btn', true, 'Creating…');
  const finish = async (fileData, fileName) => {
    if(!OFFLINE_MODE){
      try{
        const data = await apiFetch('/api/tasks', { method:'POST', body: JSON.stringify({title, assigneeId, priority, deadline, notes, fileData, fileName, recurrence, dependsOn}) });
        state.tasks.unshift(data.task);
        taskAssigneeId = ''; pendingTaskDraft = null; taskDepPicker = [];
        closeModal(); showToast('Task created'); render();
        return;
      }catch(err){ setBtnLoading('task-submit-btn', false, 'Create task'); showToast(err.message || 'Could not create task'); return; }
    }
    const v = state.volunteers.find(x=>x.id===assigneeId);
    state.tasks.unshift({id:'task'+Date.now(), title, status:'pending', assigneeId, assigneeName: v?v.name:null, priority, deadline, notes, fileData, fileName, recurrence, dependsOn, blocked:false});
    taskAssigneeId = ''; pendingTaskDraft = null; taskDepPicker = [];
    closeModal(); showToast('Task created (offline demo)'); render();
  };
  if(file){
    const reader = new FileReader();
    reader.onload = () => finish(reader.result, file.name);
    reader.onerror = () => finish(null, null);
    reader.readAsDataURL(file);
  } else {
    finish(null, null);
  }
}
async function updateTaskStatusUi(taskId, status){
  if(!OFFLINE_MODE){
    try{
      const data = await apiFetch(`/api/tasks/${taskId}`, { method:'PATCH', body: JSON.stringify({status}) });
      Object.assign(state.tasks.find(t=>t.id===taskId), data.task);
      if(data.spawned){ state.tasks.unshift(data.spawned); showToast(`Marked complete — next "${data.spawned.title}" scheduled`); }
      render();
      return;
    }catch(err){ showToast(err.message || 'Could not update task'); return; }
  }
  state.tasks.find(t=>t.id===taskId).status = status;
  render();
}

function setEventTab(t){ state.eventTab = t; render(); }
function setEventViewMode(m){ state.eventViewMode = m; render(); }
function viewEventsCalendar(){
  const y = state.calYear, m = state.calMonth;
  const firstDay = new Date(y, m, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const monthLabel = firstDay.toLocaleDateString(undefined, { month:'long', year:'numeric' });
  // itemsByDay merges events, task deadlines, volunteer birthdays (recur yearly), and goal
  // deadlines into one feed, each day cell showing a colored dot per item type.
  const itemsByDay = {};
  (state.calendarFeed||[]).forEach(item=>{
    let d;
    if(item.recursYearly){
      const [im, id] = item.date.split('-').map(Number);
      if(im-1!==m) return;
      d = id;
    } else {
      if(!item.date) return;
      const [iy,im,id] = item.date.split('-').map(Number);
      if(iy!==y || im-1!==m) return;
      d = id;
    }
    itemsByDay[d] = (itemsByDay[d]||[]).concat(item);
  });
  const todayStr = new Date().toDateString();
  let cells = '';
  for(let i=0;i<startWeekday;i++) cells += `<div class="cal-cell empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const isToday = new Date(y,m,d).toDateString()===todayStr;
    const dayItems = itemsByDay[d]||[];
    cells += `<div class="cal-cell ${isToday?'today':''} ${dayItems.length?'clickable':''}" onclick="${dayItems.length?`showDayEvents(${y},${m},${d})`:''}">
      <span>${d}</span>
      ${dayItems.length?`<div class="cal-dots">${dayItems.slice(0,3).map(it=>`<span class="cal-dot" style="background:${colorFg(it.color||'purple')};"></span>`).join('')}</div>`:''}
    </div>`;
  }
  return `
  <div class="page-header">
    <div class="header-row">
      <div><h1>Events</h1><div class="sub">${state.events.length} events · calendar view</div></div>
      <div class="row gap10" style="align-items:flex-start;">
        ${topBarIcons()}
        <button class="fab" onclick="openNewEvent()" ${canManageEvents()?'':'style="display:none;"'}>${icon('plus',20,'color:#fff')}</button>
      </div>
    </div>
    <div class="filters" style="margin-top:14px;">
      <div class="filter-pill" onclick="setEventViewMode('list')">${icon('checksquare',13)} List</div>
      <div class="filter-pill active">${icon('calendar',13)} Calendar</div>
    </div>
  </div>
  <div class="scroll" style="padding-top:8px;">
    <div class="row between" style="margin-bottom:14px;">
      <div class="back-btn" onclick="shiftCalMonth(-1)">${icon('arrowleft',16)}</div>
      <div class="bold" style="font-size:15px;">${monthLabel}</div>
      <div class="back-btn" onclick="shiftCalMonth(1)">${icon('arrowleft',16,'transform:rotate(180deg);')}</div>
    </div>
    <div class="cal-grid cal-weekdays">${['S','M','T','W','T','F','S'].map(d=>`<div class="cal-wd">${d}</div>`).join('')}</div>
    <div class="cal-grid">${cells}</div>
    <div class="row gap10" style="margin-top:16px; flex-wrap:wrap;">
      ${[['purple','Events'],['blue','Task deadlines'],['orange','Birthdays'],['red','Goal deadlines']].map(([c,label])=>`
        <div class="row gap6" style="font-size:11.5px; color:var(--text-2);"><span class="cal-dot" style="background:${colorFg(c)}; position:static; display:inline-block;"></span> ${label}</div>
      `).join('')}
    </div>
    <div style="height:16px;"></div>
  </div>`;
}
function shiftCalMonth(delta){
  let m = state.calMonth + delta, y = state.calYear;
  if(m<0){ m=11; y--; } if(m>11){ m=0; y++; }
  state.calMonth = m; state.calYear = y;
  render();
}
function showDayEvents(y,m,d){
  const dayStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const items = (state.calendarFeed||[]).filter(item=>{
    if(item.recursYearly) return item.date === dayStr.slice(5);
    return item.date === dayStr;
  });
  const iconFor = { event:'calendar', task:'checksquare', birthday:'award', goal:'target' };
  openModal(`
    <div class="modal-handle"></div>
    <div class="modal-title">${new Date(y,m,d).toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'})}</div>
    <div class="picker-list">
      ${items.map(item=>`
        <div class="picker-row" ${item.type==='event'?`onclick="closeModal(); openEventDetail('${item.id}')"`:''}>
          <div class="icon-badge" style="width:36px;height:36px;border-radius:11px;background:${colorBg(item.color||'purple')};">${icon(iconFor[item.type]||'calendar',15,'color:'+colorFg(item.color||'purple'))}</div>
          <div><div class="name">${escapeHtml(item.title)}</div><div class="role">${item.type==='event'?escapeHtml((state.events.find(e=>e.id===item.id)||{}).location||''):item.type.charAt(0).toUpperCase()+item.type.slice(1)}</div></div>
        </div>`).join('') || `<div class="muted" style="text-align:center; padding:14px 0;">Nothing on this day.</div>`}
    </div>
  `);
}

let feedbackStars = 0;
function setFeedbackStars(n){
  feedbackStars = n;
  document.querySelectorAll('#fb-star-picker [data-star]').forEach(el=>{
    const s = parseInt(el.dataset.star,10);
    el.innerHTML = icon(s<=n?'star':'starOutline',22,'color:#fbbf24');
  });
}
async function submitFeedback(eventId){
  if(!feedbackStars){ showToast('Tap a star to rate'); return; }
  const comment = document.getElementById('fb-comment').value.trim();
  if(!OFFLINE_MODE){
    try{
      const data = await apiFetch(`/api/events/${eventId}/feedback`, { method:'POST', body: JSON.stringify({rating:feedbackStars, comment}) });
      state.eventFeedback = data;
      feedbackStars = 0;
      showToast('Thanks for rating!');
      render();
      return;
    }catch(err){ showToast(err.message || 'Could not submit rating'); return; }
  }
  state.eventFeedback.recent.unshift({userName:state.user?.name||'You', rating:feedbackStars, comment, time:'now'});
  state.eventFeedback.count += 1;
  const total = state.eventFeedback.recent.reduce((a,r)=>a+r.rating,0);
  state.eventFeedback.average = Math.round((total/state.eventFeedback.count)*10)/10;
  feedbackStars = 0;
  showToast('Thanks for rating! (offline demo)');
  render();
}
async function submitMilestone(eventId){
  const input = document.getElementById('milestone-input');
  const title = input.value.trim();
  if(!title) return;
  if(!OFFLINE_MODE){
    try{
      const data = await apiFetch(`/api/events/${eventId}/milestones`, { method:'POST', body: JSON.stringify({title}) });
      state.eventMilestones.push(data.milestone);
      render();
      return;
    }catch(err){ showToast(err.message || 'Could not add milestone'); return; }
  }
  state.eventMilestones.push({id:'ms'+Date.now(), title, status:'pending'});
  render();
}
const MILESTONE_CYCLE = { pending:'in_progress', in_progress:'done', done:'pending' };
async function cycleMilestoneStatus(milestoneId){
  const m = state.eventMilestones.find(x=>x.id===milestoneId);
  if(!m) return;
  const next = MILESTONE_CYCLE[m.status] || 'pending';
  if(!OFFLINE_MODE){
    try{
      const data = await apiFetch(`/api/milestones/${milestoneId}`, { method:'PATCH', body: JSON.stringify({status:next}) });
      Object.assign(m, data.milestone);
      render();
      return;
    }catch(err){ showToast(err.message || 'Could not update milestone'); return; }
  }
  m.status = next;
  render();
}
async function deleteMilestoneUi(milestoneId){
  if(!OFFLINE_MODE){
    try{ await apiFetch(`/api/milestones/${milestoneId}`, { method:'DELETE' }); }catch(err){ showToast(err.message||'Could not delete'); return; }
  }
  state.eventMilestones = state.eventMilestones.filter(m=>m.id!==milestoneId);
  render();
}
async function uploadEventAttachment(eventId, inputEl){
  const file = inputEl.files && inputEl.files[0];
  if(!file) return;
  if(file.size > 4_500_000){ showToast('Please choose a file under ~4.5MB'); return; }
  const dataUrl = await new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
  if(!OFFLINE_MODE){
    try{
      const data = await apiFetch('/api/attachments', { method:'POST', body: JSON.stringify({entityType:'event', entityId:eventId, fileName:file.name, fileData:dataUrl, mimeType:file.type}) });
      state.eventAttachments.push(data.attachment);
      showToast('Attachment added');
      render();
      return;
    }catch(err){ showToast(err.message || 'Could not upload file'); return; }
  }
  state.eventAttachments.push({id:'att'+Date.now(), fileName:file.name, fileData:dataUrl, time:'now'});
  render();
}
async function submitEventComment(eventId){

      state.eventComments.push(data.comment);

    }catch(err){ showToast(err.message || 'Could not post comment'); return; }

let expandedGoalIds = new Set();
function toggleGoalExpand(id){
  if(expandedGoalIds.has(id)) expandedGoalIds.delete(id); else expandedGoalIds.add(id);
  render();
}
// Renders one node of the Goals hierarchy (🎯 Annual Goals -> July/August/September),
// indenting children and letting a parent be expanded/collapsed.
function renderGoalNode(g, depth){
  const daysLeft = g.deadline ? Math.ceil((new Date(g.deadline) - new Date())/86400000) : null;
  const hasChildren = g.children && g.children.length;
  const expanded = expandedGoalIds.has(g.id);
  const indent = depth * 18;
  return `
  <div class="fund-hero goal-card" style="background:linear-gradient(135deg, rgba(139,123,247,${0.14-depth*0.03}), rgba(96,165,250,${0.08-depth*0.02})); border-color:rgba(139,123,247,0.28); padding:16px; margin-top:12px; margin-left:${indent}px;">
    <div class="row between" style="margin-bottom:2px; align-items:flex-start;">
      <span class="bold row gap8" style="font-size:${depth?14:15}px; cursor:pointer;" onclick="openGoalDetail('${g.id}')">
        ${hasChildren ? `<span class="clickable" onclick="event.stopPropagation(); toggleGoalExpand('${g.id}')" style="display:inline-block; width:16px;">${icon('chevronright',13,expanded?'transform:rotate(90deg);':'')}</span>` : (depth?`<span style="display:inline-block; width:16px;">${icon('target',12,'color:#a78bfa')}</span>`:`<span style="display:inline-block; width:16px;">🎯</span>`)}
        ${escapeHtml(g.title)}
      </span>
      <span style="font-size:${depth?16:19}px; font-weight:800; color:#a78bfa; flex-shrink:0;">${g.progressPct}%</span>
    </div>
    <div class="muted" style="font-size:12.5px; margin-bottom:8px;">${g.current} / ${g.target} ${escapeHtml(g.unit)}${hasChildren?` · rolled up from ${g.children.length} sub-goal${g.children.length===1?'':'s'}`:''}</div>
    <div class="progress-track"><div class="progress-fill" style="width:${g.progressPct}%; background:linear-gradient(90deg,#8b7bf7,#5b4fe0);"></div></div>
    <div class="row between" style="margin-top:10px;">
      ${g.deadline
        ? `<span class="growth-badge ${daysLeft>=0?'neutral':'down'}">${icon('calendar',10)} ${daysLeft>=0 ? `${daysLeft} Day${daysLeft===1?'':'s'} Left` : 'Deadline passed'}</span>`
        : `<span class="muted" style="font-size:11.5px;">No deadline</span>`}
      <div class="row gap10">
        ${isAdmin() ? `<span class="link-purple clickable" style="font-size:12px;" onclick="event.stopPropagation(); openNewGoal('${g.id}')">+ Sub-goal</span>` : ''}
        ${!hasChildren ? `<span class="link-purple clickable" style="font-size:12px;" onclick="event.stopPropagation(); openGoalProgressEditor('${g.id}')">Update</span>` : ''}
      </div>
    </div>
  </div>
  ${hasChildren && expanded ? g.children.map(c=>renderGoalNode(c, depth+1)).join('') : ''}`;
}

    <div class="modal-sub">${parent ? 'e.g. a monthly slice of the annual goal.' : 'e.g. "Plant 500 Trees", "Serve 1000 Meals". Add monthly sub-goals afterward for a ClickUp-style hierarchy.'}</div>

async function submitNewGoal(){
  const title = document.getElementById('goal-title').value.trim();
  const target = parseFloat(document.getElementById('goal-target').value);
  const unit = document.getElementById('goal-unit').value.trim();
  const deadline = document.getElementById('goal-deadline').value;
  const parentEl = document.getElementById('goal-parent');
  const parentId = parentEl ? (parentEl.value || null) : null;
  if(!title || !target || target<=0){ showToast('Enter a title and a positive target'); return; }
  setBtnLoading('new-goal-submit-btn', true, 'Creating…');
  if(!OFFLINE_MODE){
    try{
      const data = await apiFetch('/api/goals', { method:'POST', body: JSON.stringify({title, unit, target, deadline, parentId}) });
      state.goals.push(data.goal);
      state.goalTree = buildGoalTree(state.goals);
      closeModal(); showToast(parentId ? 'Sub-goal created' : 'Goal created'); render();
      return;
    }catch(err){ setBtnLoading('new-goal-submit-btn', false, 'Create goal'); showToast(err.message || 'Could not create goal'); return; }
  }
  state.goals.push({id:'g'+Date.now(), title, unit, target, current:0, deadline: deadline||null, parentId: parentId||null, progressPct:0});
  state.goalTree = buildGoalTree(state.goals);
  closeModal(); showToast('Goal created (offline demo)'); render();
}
function openGoalProgressEditor(goalId){
  const g = state.goals.find(x=>x.id===goalId) || (state.goalDetail && state.goalDetail.goal.id===goalId ? state.goalDetail.goal : null);
  if(!g) return;
  openModal(`
    <div class="modal-handle"></div>
    <div class="modal-title">${escapeHtml(g.title)}</div>
    <div class="modal-sub">Update current progress out of ${g.target} ${escapeHtml(g.unit)}.</div>

    <div class="modal-field"><input id="goal-note" placeholder="e.g. Collected at Saturday market"></div>
    <button class="btn-primary" id="goal-progress-submit-btn" onclick="submitGoalProgress('${goalId}')">Save progress</button>
  `);

async function submitGoalProgress(goalId){
  const current = parseFloat(document.getElementById('goal-current').value);
  const note = document.getElementById('goal-note').value.trim();
  if(isNaN(current) || current<0){ showToast('Enter a valid number'); return; }
  setBtnLoading('goal-progress-submit-btn', true, 'Saving…');
  if(!OFFLINE_MODE){
    try{
      const data = await apiFetch(`/api/goals/${goalId}`, { method:'PATCH', body: JSON.stringify({current, note}) });
      const local = state.goals.find(x=>x.id===goalId);
      if(local) Object.assign(local, data.goal);
      state.goalTree = buildGoalTree(state.goals);
      closeModal(); showToast('Progress updated'); render();
      if(state.view==='goalDetail' && state.selectedGoalId===goalId) loadGoalDetailQuiet(goalId);
      return;
    }catch(err){ setBtnLoading('goal-progress-submit-btn', false, 'Save progress'); showToast(err.message || 'Could not update'); return; }
  }
  const g = state.goals.find(x=>x.id===goalId);
  g.current = current;
  g.progressPct = g.target>0 ? Math.min(100, Math.round((current/g.target)*1000)/10) : 0;
  state.goalTree = buildGoalTree(state.goals);
  closeModal(); showToast('Progress updated (offline demo)'); render();
}

async function submitDonation(){

  const donorName = document.getElementById('dn-donor').value.trim();
  const campaign = document.getElementById('dn-campaign').value.trim();
  if(!amount || amount<=0){ showToast('Enter a valid donation amount'); return; }
  setBtnLoading('dn-submit-btn', true, 'Saving…');

    try{
      const data = await apiFetch('/api/donations', { method:'POST', body: JSON.stringify({amount, donorName, campaign}) });
      state.fundraising = data.fundraising;
      state.activity.unshift(data.activity);

      render();
      return;
    }catch(err){ setBtnLoading('dn-submit-btn', false, 'Log donation'); showToast(err.message || 'Could not log donation'); return; }
  }
  // offline demo mode
  const d = { id:'d'+Date.now(), amount, donorName, campaign, time:'now' };
  const f = state.fundraising;
  f.totalRaised = Math.round((f.totalRaised + amount)*100)/100;
  f.progressPct = f.goal>0 ? Math.min(100, Math.round((f.totalRaised/f.goal)*1000)/10) : null;
  const key = campaign || 'General';
  const existing = f.byCampaign.find(c=>c.campaign===key);
  if(existing) existing.total += amount; else f.byCampaign.push({campaign:key, total:amount});
  f.byCampaign.sort((a,b)=>b.total-a.total);
  f.recent.unshift(d);
  state.activity.unshift({icon:'heart', color:'green', title:`${donorName?`Donation from ${donorName}`:'New donation logged'}: $${amount}`, sub:campaign||null, time:'now'});

  showToast('Donation logged (offline demo)');
  render();
}

function formatEventDate(dateIso, timeStr){
  if(!dateIso) return '';
  const [y,m,d] = dateIso.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  const dayPart = dt.toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric' });
  if(!timeStr) return dayPart;
  const [hh,mm] = timeStr.split(':').map(Number);
  const ampm = hh>=12 ? 'PM' : 'AM';
  const hour12 = ((hh+11)%12)+1;
  return `${dayPart}, ${hour12}:${String(mm).padStart(2,'0')} ${ampm}`;
}

async function sendNova(text){
  if(state.chatBusy) return;
  state.novaPrefill='';
  state.chatMessages.push({role:'user', text});
  state.chatBusy = true;
  render();
  scrollChatToBottom();
  try{
    const reply = await callNovaAPI(text);
    state.chatMessages.push({role:'assistant', text:reply});
  }catch(err){
    state.chatMessages.push({role:'assistant', text: localNovaFallback(text)});
  }
  state.chatBusy = false;
  render();
  scrollChatToBottom();
}
function scrollChatToBottom(){
  requestAnimationFrame(()=>{
    const log = document.getElementById('chatLog');
    if(log) log.scrollTop = log.scrollHeight;
  });
}
function novaContext(){
  const vNames = state.volunteers.map(v=>`${v.name} (${v.role}, ${fmtHours(v.hours)})`).join('; ');
  const eNames = state.events.map(e=>`${e.title} at ${e.location} on ${e.date}`).join('; ');
  return `You are Nova, an AI copilot embedded inside an NGO management app called NGOConnect AI, helping the team at "${state.orgName||'this NGO'}". `+
    `Be warm, concise, and practical. Use the organization's real data when relevant. `+
    `Current volunteers: ${vNames||'none yet'}. `+
    `Current events: ${eNames||'none yet'}. `+
    `This month: ${state.monthly.volunteerHours}h logged, ${state.monthly.eventsOrganized} events organized, ${activeVolCount()} active volunteers. `+
    `When asked for an email, report, or social post, write the actual finished copy, not a description of what you would write. Keep responses reasonably concise.`;
}
async function callNovaAPI(userText){
  const history = state.chatMessages.slice(0,-1).map(m=>({role:m.role, text:m.text}));
  const messages = [...history, {role:'user', text:userText}];

  if(!OFFLINE_MODE){
    // Real path: server holds the Anthropic key and answers using the org's live DB data.
    const data = await apiFetch('/api/nova/chat', { method:'POST', body: JSON.stringify({messages}) });
    return data.reply;
  }

  // Offline/static-file mode: try calling Anthropic directly (only succeeds inside Claude.ai's
  // own artifact preview, which injects the key for you) — otherwise this throws and the
  // caller falls back to localNovaFallback().
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-5",
      max_tokens: 1000,
      system: novaContext(),
      messages: messages.map(m=>({role:m.role, content:m.text}))
    })
  });
  if(!response.ok) throw new Error('API error');
  const data = await response.json();
  const text = (data.content||[]).map(b=>b.text||'').join('\n').trim();
  if(!text) throw new Error('empty');
  return text;
}
function localNovaFallback(text){
  const t = text.toLowerCase();
  if(t.includes('report')){
    return `Monthly Impact Report — ${state.orgName||'Your NGO'}\n\n`+
      `• Volunteer hours logged: ${state.monthly.volunteerHours}h\n`+
      `• Events organized: ${state.monthly.eventsOrganized}\n`+
      `• Active volunteers: ${activeVolCount()}\n`+
      `• Upcoming in next 30 days: ${upcomingCount()}\n\n`+
      `Highlights: ${state.volunteers.slice(0,2).map(v=>`${v.name} contributed ${fmtHours(v.hours)} as ${v.role}`).join('; ')}.\n\n`+
      `(Offline draft — reconnect for a fully personalized version.)`;
  }
  if(t.includes('email') || t.includes('donor') || t.includes('thank')){
    return `Subject: Thank you for believing in our work\n\n`+
      `Dear friend,\n\nYour generosity this month helped power ${activeVolCount()} volunteers across ${state.monthly.eventsOrganized} events, `+
      `totaling ${state.monthly.volunteerHours} hours of hands-on impact. Because of you, our community is stronger.\n\n`+
      `With gratitude,\n${state.orgName||'The Team'}\n\n(Offline draft — reconnect for a fully personalized version.)`;
  }
  if(t.includes('social') || t.includes('post') || t.includes('instagram') || t.includes('linkedin')){
    return `🌍 Big things happening at ${state.orgName||'our NGO'}! This month our ${activeVolCount()} volunteers logged ${state.monthly.volunteerHours} hours `+
      `across ${state.monthly.eventsOrganized} events. Want to join us? Link in bio. 💜\n\n#Volunteer #CommunityImpact\n\n(Offline draft — reconnect for a fully personalized version.)`;
  }
  return `I couldn't reach the AI service just now, so here's a quick offline note: your team has ${activeVolCount()} active volunteers, `+
    `${state.monthly.volunteerHours}h logged this month, and ${upcomingCount()} upcoming events. Try asking again once you're back online.`;
}
function formatAssistant(text){
  return escapeHtml(text).replace(/\n/g,'<br>');
}

/* ============================= UTIL ============================= */
function escapeHtml(str){
  if(str===undefined || str===null) return '';
  return String(str).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(str){ return escapeHtml(str); }
function setBtnLoading(btnId, loading, label){
  const btn = document.getElementById(btnId);
  if(!btn) return;
  if(loading){
    btn.dataset.origLabel = btn.dataset.origLabel || btn.textContent;
    btn.innerHTML = `<span class="btn-spinner"></span>${escapeHtml(label || 'Working…')}`;
    btn.classList.add('loading');
    btn.setAttribute('disabled','disabled');
  } else {
    btn.textContent = label || btn.dataset.origLabel || 'Continue';
    btn.classList.remove('loading');
    btn.removeAttribute('disabled');
  }
}
function renderKeepFocus(inputId){
  const el = document.getElementById(inputId);
  const pos = el ? el.selectionStart : null;
  render();
  const el2 = document.getElementById(inputId);
  if(el2){ el2.focus(); if(pos!==null) el2.setSelectionRange(pos,pos); }
}

/* ============================= MESSAGING ============================= */
// Proactively refresh the conversation list whenever Messages is opened — belt-and-suspenders
// in case a conversation was created while we were offline/disconnected from SSE.
async function openMessages(){
  if(OFFLINE_MODE){ showToast('Messaging needs a live server — see the README.'); return; }
  go('messages');
  try{
    const data = await apiFetch('/api/conversations', { method:'GET' });
    state.conversations = data.conversations || [];
    state.unreadMessages = state.conversations.reduce((a,c)=>a+(c.unread||0),0);
    render();
  }catch(e){ /* keep whatever we had cached */ }
}
function viewMessagesList(){
  const convos = state.conversations || [];
  return `
  <div class="screen">
    <div class="detail-top">
      <div class="back-btn" onclick="go('home')">${icon('arrowleft',18)}</div>
      <div class="detail-title">Messages</div>
      <div class="back-btn" onclick="openNewConversationPicker()">${icon('plus',18)}</div>
    </div>
    <div class="scroll" style="padding-top:6px;">
      ${convos.length ? convos.map(c=>`
        <div class="activity-item clickable" onclick="openConversation('${c.id}')">
          <div class="avatar" style="width:42px;height:42px;font-size:15px;">${escapeHtml((c.title||'?').charAt(0).toUpperCase())}</div>
          <div class="activity-text" style="flex:1;">
            <div class="t">${escapeHtml(c.title)}</div>
            <div class="s">${c.lastMessage ? escapeHtml((c.lastMessage.senderName?c.lastMessage.senderName+': ':'')+c.lastMessage.text) : 'No messages yet'}</div>
          </div>
          <div style="display:flex; flex-direction:column; align-items:flex-end; gap:4px;">
            <span class="faint" style="font-size:11px;">${c.lastMessage ? c.lastMessage.time : ''}</span>
            ${c.unread ? `<span style="min-width:18px; height:18px; padding:0 4px; border-radius:999px; background:var(--danger); color:#fff; font-size:10.5px; font-weight:800; display:flex; align-items:center; justify-content:center;">${c.unread>9?'9+':c.unread}</span>` : ''}
          </div>
        </div>`).join('') : `<div class="muted" style="text-align:center; padding:40px 0;">No conversations yet.<br>Tap + to message a colleague.</div>`}
    </div>
  </div>`;
}
function openNewConversationPicker(){
  const others = (state.colleagues||[]).filter(c=>c.id !== state.user.id);
  openModal(`
    <div class="modal-handle"></div>

async function startConversationWith(userId){
  try{
    const data = await apiFetch('/api/conversations', { method:'POST', body: JSON.stringify({ memberIds:[userId] }) });
    const convo = data.conversation;
    if(!state.conversations.find(c=>c.id===convo.id)) state.conversations.unshift(convo);
    closeModal();
    openConversation(convo.id);
  }catch(err){ showToast(err.message || 'Could not start conversation'); }
}
async function openConversation(conversationId){
  state.currentConversationId = conversationId;
  state.currentMessages = [];
  go('conversation');
  try{
    const data = await apiFetch(`/api/conversations/${conversationId}/messages`, { method:'GET' });
    state.currentMessages = data.messages || [];
    const c = state.conversations.find(x=>x.id===conversationId);
    if(c){ c.unread = 0; if(data.otherLastReadAt!==undefined) c.otherLastReadAt = data.otherLastReadAt; }
    state.unreadMessages = state.conversations.reduce((a,c)=>a+(c.unread||0),0);
    render();
    scrollMessagesToBottom();
  }catch(e){ showToast('Could not load messages'); go('messages'); }
}
function scrollMessagesToBottom(){
  setTimeout(()=>{ const el = document.getElementById('msg-scroll'); if(el) el.scrollTop = el.scrollHeight; }, 30);
}
function tickMarkHtml(msg, convo){
  const read = convo && convo.otherLastReadAt && new Date(msg.createdAt) <= new Date(convo.otherLastReadAt);
  if(read) return `<span style="margin-left:6px; font-size:12px; letter-spacing:-3px; color:#7dd3fc;">✓✓</span>`;
  return `<span style="margin-left:6px; font-size:12px; color:rgba(255,255,255,0.65);">✓</span>`;
}
function viewConversationThread(){
  const c = (state.conversations||[]).find(x=>x.id===state.currentConversationId);
  const msgs = state.currentMessages || [];
  return `
  <div class="screen">
    <div class="detail-top">
      <div class="back-btn" onclick="go('messages')">${icon('arrowleft',18)}</div>
      <div class="detail-title">${escapeHtml(c ? c.title : 'Conversation')}</div>
      <div style="width:38px;"></div>
    </div>
    <div class="scroll" id="msg-scroll" style="padding-top:10px; padding-bottom:8px;">
      ${msgs.length ? msgs.map(m=>{
        const mine = m.senderId === state.user.id;
        return `<div style="display:flex; justify-content:${mine?'flex-end':'flex-start'}; margin-bottom:10px;">
          <div style="max-width:75%; padding:9px 13px; border-radius:16px; ${mine?'background:linear-gradient(135deg,#25d366,#0891b2); color:#fff; border-bottom-right-radius:4px;':'background:rgba(139,123,247,0.14); border:1px solid var(--surface-border); color:var(--text-1); border-bottom-left-radius:4px;'}">
            ${!mine ? `<div style="font-size:11px; font-weight:700; opacity:0.7; margin-bottom:2px;">${escapeHtml(m.senderName||'')}</div>` : ''}
            <div style="font-size:14.5px; white-space:pre-wrap;">${escapeHtml(m.text)}${mine?tickMarkHtml(m,c):''}</div>
          </div>
        </div>`;
      }).join('') : `<div class="muted" style="text-align:center; padding:40px 0;">Say hello 👋</div>`}
      <div id="typingIndicator" style="display:none; align-items:center; gap:6px; padding:4px 2px 8px 2px;">
        <div style="max-width:60%; padding:8px 13px; border-radius:16px; background:rgba(139,123,247,0.14); border:1px solid var(--surface-border); border-bottom-left-radius:4px;">
          <span class="typing-dots"><span></span><span></span><span></span></span>
        </div>
      </div>
    </div>
    <div class="row gap8" style="padding:10px 4px; border-top:1px solid var(--surface-border);">
      <input id="msg-input" type="text" placeholder="Message…" style="flex:1; padding:11px 14px; border-radius:999px; border:1px solid var(--surface-border); background:var(--surface); color:var(--text-1);" oninput="notifyTyping()" onkeydown="if(event.key==='Enter'){sendMessage();}">
      <button class="back-btn" style="background:var(--accent); color:#fff; border:none;" onclick="sendMessage()">${icon('send',18)}</button>
    </div>
  </div>`;
}
let lastTypingSentAt = 0;
function notifyTyping(){
  if(OFFLINE_MODE || !state.currentConversationId) return;
  const now = Date.now();
  if(now - lastTypingSentAt < 2000) return; // throttle — don't spam the server on every keystroke
  lastTypingSentAt = now;
  apiFetch(`/api/conversations/${state.currentConversationId}/typing`, { method:'POST' }).catch(()=>{});
}
let typingHideTimer = null;
function showTypingIndicator(name){
  const el = document.getElementById('typingIndicator');
  if(!el) return;
  el.style.display = 'flex';
  const scrollEl = document.getElementById('msg-scroll');
  if(scrollEl) scrollEl.scrollTop = scrollEl.scrollHeight;
  clearTimeout(typingHideTimer);
  typingHideTimer = setTimeout(()=>{ if(el) el.style.display = 'none'; }, 3000);
}
async function sendMessage(){
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if(!text) return;
  input.value = '';
  try{
    const data = await apiFetch(`/api/conversations/${state.currentConversationId}/messages`, { method:'POST', body: JSON.stringify({ text }) });
    state.currentMessages.push(data.message);
    const c = state.conversations.find(x=>x.id===state.currentConversationId);
    if(c) c.lastMessage = { text, senderName: state.user.name, time:'now', createdAt: new Date().toISOString() };
    render();
    scrollMessagesToBottom();
  }catch(err){ showToast(err.message || 'Could not send message'); input.value = text; }
}
