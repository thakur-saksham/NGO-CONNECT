async function triggerInstall(){
  const promptEvent = state.deferredInstallPrompt;
  if(!promptEvent) return;
  promptEvent.prompt();
  try{ await promptEvent.userChoice; }catch(e){}
  state.deferredInstallPrompt = null;
  render();
}
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  state.deferredInstallPrompt = e;
  if(state.view==='home') render();
});
window.addEventListener('appinstalled', ()=>{
  state.deferredInstallPrompt = null;
  showToast('NGOConnect AI installed 🎉');
});
(function detectEnv(){
  try{
    state.isStandalone = (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) || window.navigator.standalone === true;
  }catch(e){ state.isStandalone = false; }
  try{
    state.isIOS = /iphone|ipad|ipod/i.test(window.navigator.userAgent) && !window.MSStream;
  }catch(e){ state.isIOS = false; }
})();

let pendingAvatarData = null;
async function onProfilePhotoSelected(inputEl){
  const file = inputEl.files && inputEl.files[0];
  if(!file) return;
  if(file.size > 1_500_000){ showToast('Please choose an image under 1.5MB'); return; }
  const dataUrl = await new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
  pendingAvatarData = dataUrl;
  if(state.user) state.user.avatarData = dataUrl;
  openProfileEditor();
}

  const name = document.getElementById('pf-name').value.trim();

    if(pendingAvatarData) state.user.avatarData = pendingAvatarData;
    closeModal(); showToast('Profile updated (offline demo)'); render();
    return;
  }
  try{
    const body = { name, phone, bio };

    const data = await apiFetch('/api/me', { method:'PATCH', body: JSON.stringify(body) });

function downloadCsv(filename, rows){
  const csv = rows.map(r => r.map(cell => {
    const s = String(cell===undefined||cell===null ? '' : cell);
    return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
  }).join(',')).join('\r\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Download started');
}
function exportVolunteersCsv(){
  const rows = [['Name','Role','Hours','Events','Certs','Skills','Blood Group','Emergency Contact']];

/* ============================= PERSISTENCE (offline mode only) ============================= */
/* When a real backend is running (server.js + SQLite), all data lives there and these
   functions are unused. In offline/static-file mode (no server reachable) we fall back to
   window.storage (Claude.ai artifact preview) or localStorage so a refresh doesn't lose data. */
const OFFLINE_STORAGE_KEY = 'ngoconnect_state_v1';
async function saveOfflineData(){
  const snapshot = {
    user: state.user, orgName: state.orgName,
    volunteers: state.volunteers, events: state.events,
    activity: state.activity, monthly: state.monthly,
  };
  const json = JSON.stringify(snapshot);
  try{
    if(window.storage && window.storage.set){ await window.storage.set(OFFLINE_STORAGE_KEY, json); return; }
  }catch(e){ /* fall through to local */ }
  try{ localStorage.setItem(OFFLINE_STORAGE_KEY, json); }catch(e){ /* memory-only, fine */ }
}
async function loadOfflineData(){
  let json = null;
  try{
    if(window.storage && window.storage.get){
      const res = await window.storage.get(OFFLINE_STORAGE_KEY);
      json = res ? res.value : null;
    }
  }catch(e){ /* not found or unavailable */ }
  if(!json){ try{ json = localStorage.getItem(OFFLINE_STORAGE_KEY); }catch(e){} }
  if(!json) return;
  try{
    const snap = JSON.parse(json);
    Object.assign(state, {
      user: snap.user||null, orgName: snap.orgName||'',
      volunteers: snap.volunteers||[], events: snap.events||[],
      activity: snap.activity||[], monthly: snap.monthly||{volunteerHours:0,eventsOrganized:0},
    });
  }catch(e){ /* ignore corrupt data */ }
}
// auto-save after any state-mutating render, but only in offline mode (cheap debounce)
let saveTimer=null;
const _origRender = render;
render = function(){
  _origRender();
  if(OFFLINE_MODE){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveOfflineData, 400);
  }
};

/* ============================= INIT ============================= */
/* Decide once, at startup, whether a real backend (server.js) is reachable.
   - Online:  auto-login with a saved token via /api/bootstrap, otherwise show sign-in.
   - Offline: (opened as a static file, or previewed inside Claude.ai) fall back to a
              fully-working local demo mode backed by window.storage/localStorage. */
async function initApp(){
  let serverUp = false;
  try{
    const res = await fetch(API_BASE+'/api/health', { method:'GET' });
    serverUp = res.ok;
  }catch(e){ serverUp = false; }

  if(serverUp){
    OFFLINE_MODE = false;
    const savedToken = safeLocalGet(TOKEN_KEY);
    if(savedToken){
      AUTH_TOKEN = savedToken;
      try{
        const data = await apiFetch('/api/bootstrap', { method:'GET' });
        applyBootstrap(data);
        state.view = (state.user && state.user.status === 'pending') ? 'pendingApproval' : 'home';
        connectRealtime();
      }catch(e){
        AUTH_TOKEN = null;
        safeLocalRemove(TOKEN_KEY);
        state.view = 'signin';
      }
    } else {
      state.view = 'signin';
    }
  } else {
    OFFLINE_MODE = true;
    await loadOfflineData();
    state.view = state.user ? 'home' : 'signin';
  }
  // If opened via a shared invite link (?invite=CODE), jump straight to a pre-filled Join screen.
  if(state.view==='signin'){
    try{
      const params = new URLSearchParams(window.location.search);
      const inviteCode = params.get('invite');
      if(inviteCode){ state.view = 'join'; state.pendingInviteCode = inviteCode.toUpperCase(); }
    }catch(e){ /* ignore */ }
  }
  render();
}
initApp();
